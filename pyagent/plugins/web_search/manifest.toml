name = "web-search"
version = "0.2.0"
description = "DuckDuckGo-backed web search — list results plus saved JSON attachment."
api_version = "1"

# Single tool:
#   web_search — list-style search; returns markdown results plus a
#                JSON attachment with the structured form. Role-only;
#                advertised to the bundled researcher role.
[provides]
tools = ["web_search"]

# Stateless and read-only — safe to load in subagents.
[load]
in_subagents = true
