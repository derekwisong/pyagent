name = "memory"
version = "0.2.0"
description = "Markdown-file memory ledger plus semantic recall via fastembed."
api_version = "1"

# What this plugin promises to register. Validated at load time:
# pyagent fails the plugin loud if register() registers anything not
# listed, or fails to register everything listed. Also powers the
# rich missing-tool error — when the LLM calls a tool that's gone,
# pyagent can name the plugin that provided it.
[provides]
tools = [
  "read_memory",
  "write_user",
  "write_memory",
  "add_memory",
  "set_memory_description",
  "move_memory",
  "delete_memory",
  "recall_memory",
]
prompt_sections = ["memory-guidance", "user-ledger", "memory-index"]

# Spawn-tree behavior. Subagents skip the memory plugin: writes are
# not parallel-safe, and a subagent that touches USER/MEMORY would
# clobber the root agent's view. Root loads it; subagents don't see
# any memory tools.
[load]
in_subagents = false
