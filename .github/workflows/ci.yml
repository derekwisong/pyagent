name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e '.[dev]'

      - name: Black
        run: python -m black --check pyagent tests

      - name: Ruff
        run: python -m ruff check pyagent tests

      - name: Smoke tests
        run: |
          set +e
          fail=0
          failed=""
          for t in tests/test_*.py; do
            name=$(basename "$t" .py)
            echo "::group::$name"
            python -m "tests.$name"
            rc=$?
            echo "::endgroup::"
            if [ $rc -ne 0 ]; then
              fail=$((fail+1))
              failed="$failed $name"
            fi
          done
          if [ $fail -gt 0 ]; then
            echo "FAILED ($fail tests):$failed"
            exit 1
          fi
          echo "All tests passed"
